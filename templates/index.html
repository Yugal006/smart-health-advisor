{% extends "base.html" %}

{% block title %}Home - Smart Health Advisor{% endblock %}

{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<h1>Smart Health Advisor</h1>

<form action="/analyze" method="POST">

    <label>Name:</label>
    <input type="text" name="name" required><br><br>

    <label>Age:</label>
    <input type="number" name="age" required><br><br>

    <label>Gender:</label>
    <select name="gender" required>
        <option value="male">Male</option>
        <option value="female">Female</option>
    </select><br><br>

    <label>Weight (kg):</label>
    <input type="number" name="weight" required><br><br>

    <label>Search Symptoms</label>
    <div class="suggestion-container">
        <input type="text" id="symptomSearch" placeholder="Type to search symptoms..." autocomplete="off" style="width:100%;">
        <div id="suggestionBox" class="suggestion-box"></div>
    </div>
    <br>

    <h4>Selected Symptoms</h4>
    <div id="selectedSymptoms"></div>

    <div id="checkboxContainer" style="display:none;">
        {% for symptom in symptoms %}
        <label>
            <input type="checkbox" name="symptoms" value="{{ symptom }}">
            {{ symptom.replace("_"," ").title() }}
        </label><br>
        {% endfor %}
    </div>

    <label>Severity</label>
    <input type="range" min="1" max="10" value="5" id="severitySlider" name="severity">
    <span id="severityValue">5</span>
    <hr>

    <button type="submit" class="btn">Analyze</button>
    <br><br>
    <a href="/donor/register" class="btn">Blood Donor System</a>

</form>

<script>
const allSymptoms = [
    {% for symptom in symptoms %}
    "{{ symptom }}",
    {% endfor %}
];

const searchInput = document.getElementById("symptomSearch");
const suggestionBox = document.getElementById("suggestionBox");
const selectedContainer = document.getElementById("selectedSymptoms");
let selectedSymptoms = [];

// Search input
searchInput.addEventListener("input", function() {
    const query = this.value.toLowerCase();
    suggestionBox.innerHTML = "";
    suggestionBox.style.display = "none";

    if (!query) return;

    const matches = allSymptoms
        .filter(s => s.toLowerCase().startsWith(query))
        .concat(allSymptoms.filter(s => s.toLowerCase().includes(query) && !s.toLowerCase().startsWith(query)))
        .slice(0, 10);

    if(matches.length > 0) suggestionBox.style.display = "block";

    matches.forEach(symptom => {
        const div = document.createElement("div");
        div.className = "suggestion-item";
        div.textContent = symptom.replaceAll("_"," ");
        div.onclick = () => addSymptom(symptom);
        suggestionBox.appendChild(div);
    });
});

// Add symptom
function addSymptom(symptom) {
    if (selectedSymptoms.includes(symptom)) return;
    selectedSymptoms.push(symptom);
    renderSelectedSymptoms();

    const checkbox = document.querySelector(`input[value="${symptom}"]`);
    if (checkbox) checkbox.checked = true;

    suggestionBox.innerHTML = "";
    suggestionBox.style.display = "none";
    searchInput.value = "";
}

// Render selected symptoms
function renderSelectedSymptoms() {
    selectedContainer.innerHTML = "";

    selectedSymptoms.forEach((symptom, index) => {
        const span = document.createElement("span");
        span.className = "symptom-tag";
        span.textContent = symptom.replaceAll("_"," ");
        span.onclick = () => {
            selectedSymptoms = selectedSymptoms.filter(s => s !== symptom);
            const checkbox = document.querySelector(`input[value="${symptom}"]`);
            if (checkbox) checkbox.checked = false;
            renderSelectedSymptoms();
        };
        selectedContainer.appendChild(span);

        // Add comma except last
        if (index < selectedSymptoms.length - 1) {
            const comma = document.createElement("span");
            comma.textContent = ", ";
            selectedContainer.appendChild(comma);
        }
    });
}

// Hide suggestion box on click outside
document.addEventListener("click", function(e) {
    if (!searchInput.contains(e.target) && !suggestionBox.contains(e.target)) {
        suggestionBox.innerHTML = "";
        suggestionBox.style.display = "none";
    }
});

// Severity slider
const slider = document.getElementById("severitySlider");
const output = document.getElementById("severityValue");

function updateColor(val) {
    let color;
    if (val <= 3) color = "green";
    else if (val <= 6) color = "orange";
    else color = "red";

    slider.style.background = `linear-gradient(to right, ${color} ${val*10}%, #ddd ${val*10}%)`;
}

slider.oninput = function() {
    output.innerText = this.value;
    updateColor(this.value);
}
updateColor(slider.value);
</script>

{% endblock %}
