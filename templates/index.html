{% extends "base.html" %}

{% block title %}Home - Smart Health Advisor{% endblock %}

{% block content %}

<h1>Smart Health Advisor</h1>

<form action="/analyze" method="POST">

    <label>Name:</label>
    <input type="text" name="name" required><br><br>

    <label>Age:</label>
    <input type="number" name="age" required><br><br>

    <label>Gender:</label>
    <select name="gender" required>
        <option value="male">Male</option>
        <option value="female">Female</option>
    </select><br><br>

    <label>Weight (kg):</label>
    <input type="number" name="weight" required><br><br>

    <label>Select Symptoms:</label><br>
    <select name="symptoms" multiple size="8" required>
        <option value="fever">Fever</option>
        <option value="headache">Headache</option>
        <option value="cough">Cough</option>
        <option value="sore throat">Sore Throat</option>
        <option value="fatigue">Fatigue</option>
        <option value="chest pain">Chest Pain</option>
        <option value="shortness of breath">Shortness of Breath</option>
        <option value="nausea">Nausea</option>
        <option value="vomiting">Vomiting</option>
        <option value="dizziness">Dizziness</option>
    </select>

    <p>Hold CTRL (Windows) or CMD (Mac) to select multiple.</p>

    <label>Symptom Severity (1–10):</label><br>
    <input type="range" name="severity" min="1" max="10" value="5" oninput="this.nextElementSibling.value = this.value">
    <output>5</output><br><br>
    <hr>
    <button type="submit" class="btn">Analyze</button>
    <br><br>
    <a href="/donor/register" class="btn">Blood Donor System</a>

</form>

{% endblock %}
