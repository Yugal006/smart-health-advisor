{% extends "base.html" %}

{% block title %}Register Blood Donor{% endblock %}

{% block content %}

<section class="advisor-hero">

    <div class="advisor-container">

        <h1 class="advisor-heading">
            <span class="green">Blood Donor</span>
            <span>Registration</span>
        </h1>

        <p class="advisor-sub">
            Register yourself as a blood donor to help people in need.
        </p>

        <form action="/donor/register" method="POST" class="advisor-form">

            <!-- ROW 1 -->
            <div class="form-row">

                <div class="input-box">
                    <label>Name</label>
                    <input type="text" name="name" required>
                </div>

                <div class="input-box">
                    <label>Age</label>
                    <input type="number" name="age" placeholder="Years" required>
                </div>

            </div>

            <!-- ROW 2 -->
            <div class="form-row">

                <div class="input-box blood-select">

                    <label>Blood Group</label>

                    <div class="custom-dropdown">

                        <input type="text" id="bloodInput" placeholder="Select" readonly>

                        <div class="dropdown-arrow"></div>

                        <div class="blood-options">

                            <div data-value="A+">A+</div>
                            <div data-value="A-">A-</div>
                            <div data-value="B+">B+</div>
                            <div data-value="B-">B-</div>
                            <div data-value="O+">O+</div>
                            <div data-value="O-">O-</div>
                            <div data-value="AB+">AB+</div>
                            <div data-value="AB-">AB-</div>

                        </div>

                        <input type="hidden" name="blood_group" id="bloodHidden" required>

                    </div>

                </div>

                <div class="input-box">
                    <label>City</label>
                    <input type="text" name="city" required>
                </div>

            </div>

            <!-- ROW 3 -->
            <div class="form-row">

                <div class="input-box">
                    <label>Phone</label>
                    <input type="text" name="phone" required>
                </div>

                <div class="input-box date-box">
                    <label>Last Donation</label>
                    <input type="text" id="donationDate" name="last_donation" placeholder="Select a date">
                    <img src="/static/images/logos/booking.png" alt="calendar icon" class="calendar-icon">
                </div>

            </div>

            <!-- BUTTONS -->
            <div class="button-row">

                <button type="submit" class="btn">
                    Register Donor
                </button>

                <a href="/donor/search" class="btn-secondary">
                    Search Donors
                </a>

            </div>

        </form>

    </div>

</section>

<script>
    document.querySelectorAll('input[type="date"]').forEach(input => {

        input.addEventListener("click", function () {

            if (this.showPicker) {
                this.showPicker();
            }

        });

    });


    const bloodInput = document.getElementById("bloodInput");
    const bloodOptions = document.querySelector(".blood-options");
    const bloodHidden = document.getElementById("bloodHidden");

    bloodInput.addEventListener("click", () => {

        bloodOptions.style.display =
            bloodOptions.style.display === "block" ? "none" : "block";

    });

    document.querySelectorAll(".blood-options div").forEach(option => {

        option.addEventListener("click", () => {

            bloodInput.value = option.textContent;
            bloodHidden.value = option.dataset.value;

            bloodOptions.style.display = "none";

        });

    });

    document.addEventListener("click", (e) => {

        if (!e.target.closest(".blood-select")) {
            bloodOptions.style.display = "none";
        }

    });
</script>
<script>
    flatpickr("#donationDate", {
        dateFormat: "Y-m-d",      // 2026-03-14
        allowInput: true,          // allow manual typing
        maxDate: "today",          // prevent future dates
        yearRange: [2000, new Date().getFullYear()], // allows past years
        onReady: function (selectedDates, dateStr, instance) {

            const cal = instance.calendarContainer;

            // Glass mint theme
            cal.style.background = "rgba(245, 245, 245, 0.55)";
            cal.style.backdropFilter = "blur(10px)";
            cal.style.borderRadius = "12px";
            cal.style.color = "#4b8673";
            cal.style.boxShadow = "0 10px 25px rgba(0,0,0,0.15)";

            // Header styles (month + year)
            const header = cal.querySelector(".flatpickr-months");
            if (header) {
                header.style.background = "rgba(255,255,255,0.3)";
                header.style.color = "#4b8673";
                header.style.borderRadius = "10px";
            }

            // Weekdays
            const weekdays = cal.querySelector(".flatpickr-weekdays");
            if (weekdays) {
                weekdays.style.color = "#4b8673";
                weekdays.style.fontWeight = "bold";
            }

            // Day cells
            const days = cal.querySelectorAll(".flatpickr-day");
            days.forEach(day => {
                day.style.color = "#4b8673";
                day.addEventListener("mouseenter", () => {
                    day.style.backgroundColor = "rgba(78,149,145,0.2)";
                    day.style.borderRadius = "6px";
                });
                day.addEventListener("mouseleave", () => {
                    day.style.backgroundColor = "transparent";
                });
            });

            // Month dropdown (year navigation)
            const prevMonth = cal.querySelector(".flatpickr-prev-month");
            const nextMonth = cal.querySelector(".flatpickr-next-month");
            if (prevMonth) prevMonth.style.color = "#4b8673";
            if (nextMonth) nextMonth.style.color = "#4b8673";
        }
    });
</script>
{% endblock %}
