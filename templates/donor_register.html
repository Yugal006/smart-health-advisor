{% extends "base.html" %}

{% block title %}Register Blood Donor{% endblock %}

{% block content %}

<h1>Blood Donor Registration</h1>

<form action="/donor/register" method="POST">

    <label>Name:</label>
    <input type="text" name="name" required><br><br>

    <label>Age:</label>
    <input type="number" name="age" required><br><br>

    <label>Blood Group:</label>
    <select name="blood_group" required>
        <option value="A+">A+</option>
        <option value="A-">A-</option>
        <option value="B+">B+</option>
        <option value="B-">B-</option>
        <option value="O+">O+</option>
        <option value="O-">O-</option>
        <option value="AB+">AB+</option>
        <option value="AB-">AB-</option>
    </select><br><br>

    <label>City:</label>
    <input type="text" name="city" required><br><br>

    <label>Phone:</label>
    <input type="text" name="phone" required><br><br>

    <label>Last Donation Date:</label>
    <input type="date" name="last_donation"><br><br>

    <button type="submit" class="btn">Register Donor</button>

</form>

<hr>

<a href="/donor/search" class="btn">Search Donors</a>

{% endblock %}
