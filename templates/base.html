<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='images/favicon.ico') }}">

    <title>{% block title %}CodeCure{% endblock %}</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/globals.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

</head>

<body>

    <div class="main-page">

        <header class="site-header">

            <a href="{{ url_for('home') }}" class="logo-link">
                <img src="{{ url_for('static', filename='images/logos/logo.png') }}" class="logo">
            </a>

            <nav class="main-nav">
                <ul class="nav-list">

                    <li class="{% if request.endpoint == 'home' %}current{% endif %}"><a
                            href="{{ url_for('home') }}">Home</a></li>
                    <li class="{% if request.endpoint == 'donor_register' %}current{% endif %}"><a
                            href="{{ url_for('donor_register') }}">Blood Donate</a></li>
                    <li class="{% if request.endpoint == 'contact' %}current{% endif %}"><a
                            href="{{ url_for('contact') }}">Contact</a></li>
                    <li class="{% if request.endpoint == 'about_us' %}current{% endif %}"><a
                            href="{{ url_for('about_us') }}">About Us</a></li>

                </ul>
            </nav>

            <a href="{{ url_for('user_profile') }}">
                <img src="{{ url_for('static', filename='images/logos/user.png') }}" class="user">
            </a>

        </header>

        {% block content %}{% endblock %}

    </div>

</body>

</html>
